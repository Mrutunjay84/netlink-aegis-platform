services:
  postgres:
    container_name: postgres
    image: postgres:16
    pull_policy: always
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 150s

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: ./netlink/backend/Dockerfile
    image: netlink-aegis-backend:latest
    pull_policy: build
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ALLOWED_HOSTS=backend,localhost,${CISO_FQDN}
      - CISO_ASSISTANT_URL=https://${CISO_FQDN}
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - AUTH_TOKEN_TTL=7200
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_DATA_HOME=/tmp/.local/share
      - POSTGRES_NAME=${POSTGRES_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
    volumes:
      - ./db:/code/db
    user: "1001:1001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://backend:8000/api/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 100s

  huey:
    container_name: huey
    build:
      context: .
      dockerfile: ./netlink/backend/Dockerfile
    image: netlink-aegis-backend:latest
    pull_policy: build
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    environment:
      - ALLOWED_HOSTS=backend,localhost,${CISO_FQDN}
      - CISO_ASSISTANT_URL=https://${CISO_FQDN}
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - AUTH_TOKEN_TTL=7200
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_DATA_HOME=/tmp/.local/share
      - POSTGRES_NAME=${POSTGRES_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
    volumes:
      - ./db:/code/db
    user: "1001:1001"
    entrypoint:
      - /bin/sh
      - -c
      - |
        poetry run python manage.py run_huey -w 2 --scheduler-interval 60

  frontend:
    container_name: frontend
    environment:
      - PUBLIC_BACKEND_API_URL=http://backend:8000/api
      - PUBLIC_BACKEND_API_EXPOSED_URL=https://${CISO_FQDN}/api
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_DATA_HOME=/tmp/.local/share
    build:
      context: .
      dockerfile: ./netlink/frontend/Dockerfile
      args:
        NODE_BUILD_HEAP_MB: ${NODE_BUILD_HEAP_MB:-8192}
    image: netlink-aegis-frontend:latest
    pull_policy: build
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    user: "1001:1001"

  caddy:
    container_name: caddy
    image: caddy:2.11.2
    environment:
      - CISO_ASSISTANT_URL=https://${CISO_FQDN}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 443:443
    volumes:
      - ./caddy_data:/data
      - ${CERT_PATH}:/etc/caddy/cert.pem:ro
      - ${KEY_PATH}:/etc/caddy/key.pem:ro
    command: |
      sh -c 'echo "$$CISO_ASSISTANT_URL {
      reverse_proxy /api/* backend:8000
      reverse_proxy /* frontend:3000
      tls /etc/caddy/cert.pem /etc/caddy/key.pem
      }" > Caddyfile && caddy run'
